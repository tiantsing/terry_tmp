<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>pH计挑战赛 · 教师成绩系统(含成绩统计+AI学情分析)</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(145deg, #0a192f 0%, #0b2b44 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 16px 12px 32px;
            min-height: 100vh;
        }
        .game-container {
            max-width: 650px;
            margin: 0 auto;
            background: rgba(10, 25, 47, 0.65);
            backdrop-filter: blur(6px);
            border-radius: 48px;
            padding: 18px 16px 24px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 200, 255, 0.4);
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            background: linear-gradient(135deg, #E0F2FE, #7DD3FC);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 6px;
        }
        .sub {
            text-align: center;
            color: #8ab3cf;
            font-size: 0.7rem;
            background: rgba(0, 30, 60, 0.5);
            display: inline-block;
            width: auto;
            margin: 0 auto 16px;
            padding: 4px 14px;
            border-radius: 40px;
        }
        .student-info {
            background: rgba(0, 40, 65, 0.6);
            border-radius: 40px;
            padding: 8px 16px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .student-info label {
            color: #bbd9ff;
            font-weight: 500;
            font-size: 0.85rem;
        }
        .student-info input {
            flex: 2;
            min-width: 140px;
            background: #f0f9ff;
            border: none;
            border-radius: 60px;
            padding: 8px 14px;
            font-size: 0.85rem;
            outline: none;
            color: #022b3a;
            font-weight: 500;
        }
        .score-area {
            background: #0a2e46;
            border-radius: 32px;
            padding: 10px;
            margin-bottom: 16px;
            text-align: center;
            font-size: 1rem;
            font-weight: bold;
            color: #c2edff;
        }
        .drag-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 20px;
        }
        .panel {
            background: rgba(12, 35, 55, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 14px 12px;
            border: 1px solid rgba(0, 212, 255, 0.4);
        }
        .panel-title {
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
            color: #7ad0ff;
            margin-bottom: 12px;
        }
        .cards-list {
            min-height: 300px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .step-card {
            background: linear-gradient(115deg, #eef5ff, #ffffff);
            border-left: 5px solid #0a7bff;
            border-radius: 18px;
            padding: 10px 12px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #0a2b3e;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            cursor: grab;
            touch-action: none;
        }
        .sortable-drag {
            opacity: 0.4;
            background: #b4dcff;
        }
        .empty-hint {
            text-align: center;
            color: #6f9bc2;
            font-size: 0.75rem;
            padding: 30px 12px;
            background: rgba(0, 40, 60, 0.5);
            border-radius: 28px;
            border: 1px dashed #2c6c9e;
        }
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin: 12px 0 16px;
            flex-wrap: wrap;
        }
        .btn {
            border: none;
            background: linear-gradient(95deg, #0b5e7c, #0a4b73);
            padding: 10px 20px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.85rem;
            color: white;
            box-shadow: 0 3px 0 #022b3a;
            cursor: pointer;
            transition: 0.07s linear;
        }
        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #022b3a;
        }
        .teacher-btn {
            background: linear-gradient(95deg, #3a6b8f, #28587c);
            box-shadow: 0 3px 0 #1a405a;
        }
        .teacher-panel {
            margin-top: 16px;
            background: rgba(2, 20, 35, 0.95);
            border-radius: 32px;
            padding: 14px;
            border: 1px solid #2d8fcf;
            color: white;
        }
        .compare-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.7rem;
        }
        .compare-table th, .compare-table td {
            padding: 8px 4px;
            border-bottom: 1px solid #2e6f94;
            color: #eef5ff;
        }
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #0b2a3e;
            max-width: 90%;
            width: 550px;
            max-height: 80%;
            overflow: auto;
            border-radius: 48px;
            padding: 20px;
            border: 1px solid #2d8fcf;
            color: white;
        }
        .close-modal {
            float: right;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .record-list {
            max-height: 260px;
            overflow-y: auto;
            font-size: 0.75rem;
        }
        .record-item {
            background: #0f3853;
            margin: 6px 0;
            padding: 8px;
            border-radius: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .detail-btn {
            background: #2a6b8f;
            border: none;
            color: white;
            padding: 4px 12px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .stats-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
            font-size: 0.75rem;
        }
        .stats-table th, .stats-table td {
            border-bottom: 1px solid #2e6f94;
            padding: 6px;
            text-align: left;
        }
        .analysis-box {
            background: #0f3853;
            border-radius: 20px;
            padding: 12px;
            margin-top: 16px;
            font-size: 0.8rem;
        }
        footer {
            text-align: center;
            font-size: 0.6rem;
            color: #6d99bd;
            margin-top: 20px;
        }
        @media (min-width: 700px) {
            .drag-area {
                flex-direction: row;
            }
            .panel {
                flex: 1;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1>🧪 pH计检测饮用水操作步骤挑战赛</h1>
    <div style="text-align:center;"><span class="sub">🔬 拖拽排序 · 10步闯关 · 教师可查成绩统计+AI学情分析</span></div>

    <div class="student-info">
        <label>👤 学生姓名/学号：</label>
        <input type="text" id="studentName" placeholder="例如: 张三 / 2024001" autocomplete="off">
    </div>

    <div class="drag-area">
        <div class="panel">
            <div class="panel-title">📦 待排序卡片 (拖动到右侧)</div>
            <div id="leftList" class="cards-list"></div>
        </div>
        <div class="panel">
            <div class="panel-title">🎯 你的操作顺序 (从上往下)</div>
            <div id="rightList" class="cards-list">
                <div class="empty-hint">✨ 将左侧步骤拖拽至此<br>并按正确实验顺序排列</div>
            </div>
        </div>
    </div>

    <div class="action-buttons">
        <button class="btn" id="submitBtn">📝 提交并评分</button>
        <button class="btn" id="resetBtn">🔄 重置挑战</button>
        <button class="btn teacher-btn" id="teacherBtn">🔒 教师成绩系统</button>
    </div>

    <div id="scoreDetail" class="score-area" style="display: none;"></div>
    <div id="teacherPanel" class="teacher-panel" style="display: none;">
        <div style="display:flex; justify-content: space-between; flex-wrap:wrap; gap:8px; margin-bottom:12px;">
            <span style="font-weight:bold;">📊 学生成绩管理</span>
            <div>
                <button id="clearRecordsBtn" class="btn" style="background:#5e3a2e; padding:4px 12px;">清空记录</button>
                <button id="exportCsvBtn" class="btn" style="background:#2a6b5e; padding:4px 12px;">导出原始记录CSV</button>
                <button id="statsBtn" class="btn" style="background:#28a745; padding:4px 12px;">📈 成绩汇总+AI学情分析</button>
            </div>
        </div>
        <div id="recordsList" class="record-list"></div>
        <div id="statsArea" style="margin-top: 16px;"></div>
    </div>
</div>
<footer>✅ 正确顺序依据国家标准 | 提交后仅显示得分，教师需密码查看详细对照表及学情分析</footer>

<script>
    (function() {
        // ---------- 10个步骤（无序号，学生卡片）---------
        const DISPLAY_STEPS = [
            "准备与组装pH计",
            "电极活化与清洗",
            "取标准缓冲液",
            "pH计校准（两点校准）",
            "检查/调节温度补偿",
            "校准后验证电极斜率/响应",
            "测量水样前润洗电极",
            "插入水样测量",
            "读取稳定pH值并记录",
            "清洗电极并妥善保存"
        ];

        // 带序号的正确顺序（教师端显示）
        const CORRECT_WITH_NUMBER = [
            "① 准备与组装pH计",
            "② 电极活化与清洗",
            "③ 取标准缓冲液",
            "④ pH计校准（两点校准）",
            "⑤ 检查/调节温度补偿",
            "⑥ 校准后验证电极斜率/响应",
            "⑦ 测量水样前润洗电极",
            "⑧ 插入水样测量",
            "⑨ 读取稳定pH值并记录",
            "⑩ 清洗电极并妥善保存"
        ];

        // 教师密码
        const TEACHER_PASSWORD = "teacher123";

        // API Key (用于AI学情分析)
        let apiKey = localStorage.getItem('order_api_key') || '';
        // 由于排序游戏不需要AI评分，但学情分析需要调用DeepSeek API，所以增加一个设置API Key的区域（简单起见，复用教师密码后的额外输入？更友好地增加一个API输入框）
        // 在教师面板中增加API Key设置（只有教师可见），方便调用AI分析
        // 我们动态添一个简单的API配置区域在教师面板顶部

        let leftSortable, rightSortable;
        const leftContainer = document.getElementById('leftList');
        const rightContainer = document.getElementById('rightList');
        const studentNameInput = document.getElementById('studentName');
        const scoreDetailDiv = document.getElementById('scoreDetail');
        const teacherPanel = document.getElementById('teacherPanel');

        // 辅助函数
        function shuffleArray(arr) {
            let a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function createCard(stepText) {
            const div = document.createElement('div');
            div.className = 'step-card';
            div.textContent = stepText;
            div.setAttribute('data-step', stepText);
            return div;
        }

        function updatePlaceholders() {
            const rightCards = rightContainer.querySelectorAll('.step-card');
            const rightHints = rightContainer.querySelectorAll('.empty-hint');
            if (rightCards.length === 0 && rightHints.length === 0) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'empty-hint';
                emptyDiv.innerHTML = '✨ 将左侧步骤拖拽至此<br>并按正确实验顺序排列';
                rightContainer.appendChild(emptyDiv);
            } else if (rightCards.length > 0) {
                rightHints.forEach(h => h.remove());
            }

            const leftCards = leftContainer.querySelectorAll('.step-card');
            const leftHint = leftContainer.querySelector('.left-empty-tip');
            if (leftCards.length === 0 && !leftHint) {
                const tip = document.createElement('div');
                tip.className = 'empty-hint left-empty-tip';
                tip.innerHTML = '📌 所有步骤已移至右侧<br>可拖拽回左侧重新排序';
                tip.style.marginTop = '8px';
                leftContainer.appendChild(tip);
            } else if (leftCards.length > 0 && leftHint) {
                leftHint.remove();
            }
        }

        function getStudentOrder() {
            const cards = rightContainer.querySelectorAll('.step-card');
            return Array.from(cards).map(c => c.getAttribute('data-step') || c.textContent);
        }

        function calculateScoreAndErrors(studentOrder) {
            let score = 0;
            const errors = [];          // 学生端模糊
            const detailedErrors = [];  // 教师端详细
            for (let i = 0; i < DISPLAY_STEPS.length; i++) {
                const correct = DISPLAY_STEPS[i];
                const student = i < studentOrder.length ? studentOrder[i] : null;
                if (student === correct) {
                    score++;
                } else {
                    errors.push(`第${i+1}步顺序不正确`);
                    let detailMsg = `第${i+1}步错误：应为“${CORRECT_WITH_NUMBER[i]}”`;
                    if (student) {
                        detailMsg += `，实际为“${student}”`;
                    } else {
                        detailMsg += `，实际缺失步骤`;
                    }
                    detailedErrors.push(detailMsg);
                }
            }
            if (studentOrder.length > DISPLAY_STEPS.length) {
                for (let i = DISPLAY_STEPS.length; i < studentOrder.length; i++) {
                    errors.push(`第${i+1}位出现多余步骤`);
                    detailedErrors.push(`多余步骤：第${i+1}位出现“${studentOrder[i]}” (正确操作无此步)`);
                }
            }
            return { score, errors, detailedErrors };
        }

        function showScoreOnly(studentOrder) {
            const { score, errors } = calculateScoreAndErrors(studentOrder);
            const total = DISPLAY_STEPS.length;
            scoreDetailDiv.style.display = 'block';
            if (errors.length === 0) {
                scoreDetailDiv.innerHTML = `🧪 本次得分: <span style="font-size:1.4rem; color:#7df9ff;">${score}</span> / ${total}<br><span style="font-size:0.8rem;">🎉 完全正确！步骤顺序完美！</span>`;
            } else {
                scoreDetailDiv.innerHTML = `🧪 本次得分: <span style="font-size:1.4rem; color:#7df9ff;">${score}</span> / ${total}<br><span style="font-size:0.7rem;">❗ 注意：有 ${errors.length} 处顺序错误，请查看教师反馈学习。</span>`;
            }
        }

        // 存储
        const STORAGE_KEY = 'ph_meter_10steps_records';
        function getScoreRecords() {
            const raw = localStorage.getItem(STORAGE_KEY);
            return raw ? JSON.parse(raw) : [];
        }
        function saveScoreRecord(record) {
            const records = getScoreRecords();
            records.push(record);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
        }

        function onSubmit() {
            const studentName = studentNameInput.value.trim();
            if (studentName === "") {
                alert("请填写学生姓名或学号");
                return;
            }
            const studentOrder = getStudentOrder();
            if (studentOrder.length === 0) {
                alert("请先将步骤拖拽到右侧区域并排序后再提交");
                return;
            }
            const { score, detailedErrors } = calculateScoreAndErrors(studentOrder);
            const total = DISPLAY_STEPS.length;
            const now = new Date();
            const timeStr = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()} ${now.getHours()}:${now.getMinutes()}:${now.getSeconds()}`;
            const record = {
                name: studentName,
                score: score,
                total: total,
                time: timeStr,
                timestamp: now.getTime(),
                studentOrder: studentOrder,
                errorDetails: detailedErrors
            };
            saveScoreRecord(record);
            showScoreOnly(studentOrder);
            const toast = document.createElement('div');
            toast.innerText = `✅ 成绩已保存 (${studentName} 得分 ${score}/${total})`;
            toast.style.position = 'fixed'; toast.style.bottom = '20px'; toast.style.left = '20px';
            toast.style.right = '20px'; toast.style.background = '#0a6b8a'; toast.style.color = 'white';
            toast.style.padding = '12px'; toast.style.borderRadius = '40px'; toast.style.textAlign = 'center';
            toast.style.zIndex = '999'; toast.style.fontSize = '0.85rem';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        // 教师端：显示某学生详细答题卡
        function showStudentDetail(record) {
            const modal = document.createElement('div');
            modal.className = 'modal';
            const studentOrder = record.studentOrder || [];
            let rows = '';
            for (let i = 0; i < CORRECT_WITH_NUMBER.length; i++) {
                const correctStep = CORRECT_WITH_NUMBER[i];
                const studentStep = (i < studentOrder.length) ? studentOrder[i] : '<span style="color:#ffae70;">❌ 缺失</span>';
                const isMatch = (i < studentOrder.length && studentOrder[i] === DISPLAY_STEPS[i]);
                const markIcon = isMatch ? '✅' : '❌';
                rows += `<tr>
                    <td style="padding:6px;">${i+1}</td>
                    <td>${correctStep}</td>
                    <td>${studentStep}</td>
                    <td style="text-align:center;">${markIcon}</td>
                </tr>`;
            }
            const errorHtml = record.errorDetails && record.errorDetails.length ? 
                `<div style="margin-top:12px; background:#1f4e6e; padding:8px; border-radius:20px;"><strong>❗ 扣分原因：</strong><br>${record.errorDetails.join('；')}</div>` : 
                `<div style="margin-top:12px; color:#7df9ff;">🎉 完全正确！无错误步骤。</div>`;
            modal.innerHTML = `
                <div class="modal-content">
                    <span class="close-modal">&times;</span>
                    <h3 style="margin-bottom:12px;">📖 ${escapeHtml(record.name)} 的详细答题卡</h3>
                    <div style="font-size:0.75rem;">提交时间：${record.time} | 得分：${record.score}/${record.total}</div>
                    <table class="compare-table" style="margin-top:12px; width:100%;">
                        <thead><tr><th>位置</th><th>正确步骤</th><th>学生步骤</th><th>对错</th></tr></thead>
                        <tbody>${rows}</tbody>
                    </table>
                    ${errorHtml}
                </div>
            `;
            document.body.appendChild(modal);
            modal.querySelector('.close-modal').onclick = () => modal.remove();
            modal.onclick = (e) => { if(e.target === modal) modal.remove(); };
        }

        function renderTeacherRecords() {
            const records = getScoreRecords();
            const container = document.getElementById('recordsList');
            if (!container) return;
            if (records.length === 0) {
                container.innerHTML = '<div class="empty-hint">暂无任何学生提交记录</div>';
                return;
            }
            const sorted = [...records].sort((a,b) => b.timestamp - a.timestamp);
            let html = '';
            sorted.forEach((rec) => {
                html += `<div class="record-item">
                            <span><strong>${escapeHtml(rec.name)}</strong>  ${rec.time}</span>
                            <span style="background:#007799; padding:2px 12px; border-radius:20px;">${rec.score}/${rec.total}</span>
                            <button class="detail-btn" data-id="${rec.timestamp}">📋 查看详情</button>
                         </div>`;
            });
            container.innerHTML = html;
            document.querySelectorAll('.detail-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const ts = parseInt(btn.dataset.id);
                    const record = sorted.find(r => r.timestamp === ts);
                    if (record) showStudentDetail(record);
                });
            });
        }

        // 成绩汇总：取每个学生最高分
        function computeStudentStats() {
            const records = getScoreRecords();
            const studentMap = new Map();
            for (let rec of records) {
                if (!studentMap.has(rec.name)) {
                    studentMap.set(rec.name, { maxScore: -1, name: rec.name });
                }
                let stu = studentMap.get(rec.name);
                if (rec.score > stu.maxScore) {
                    stu.maxScore = rec.score;
                }
            }
            let studentList = [];
            for (let stu of studentMap.values()) {
                studentList.push({
                    name: stu.name,
                    score: stu.maxScore,
                    total: DISPLAY_STEPS.length
                });
            }
            studentList.sort((a,b) => b.score - a.score);
            return studentList;
        }

        function renderStatsTable() {
            let stats = computeStudentStats();
            if (stats.length === 0) return '<div>暂无学生成绩数据</div>';
            let html = '<h3 style="margin-top:12px;">📈 学生成绩汇总表（取每人最高分，总分10分）</h3>';
            html += '<table class="stats-table"><thead><tr><th>排名</th><th>姓名</th><th>最高得分/10</th></tr></thead><tbody>';
            stats.forEach((stu, idx) => {
                html += `<tr><td>${idx+1}</td><td>${escapeHtml(stu.name)}</td><td>${stu.score}</td></tr>`;
            });
            html += '</tbody></table>';
            return html;
        }

        // AI学情分析
        async function callAIAnalysis(stats) {
            if (!apiKey) {
                throw new Error("未设置DeepSeek API Key，请在教师面板上方填写并保存API Key。");
            }
            const avgScore = stats.reduce((s,stu) => s + stu.score, 0) / stats.length;
            const lowCount = stats.filter(s => s.score < 6).length;
            const highCount = stats.filter(s => s.score >= 9).length;
            const summary = `班级共有${stats.length}名学生。满分10分，班级平均分：${avgScore.toFixed(1)}。高分(≥9分)人数：${highCount}，低分(<6分)人数：${lowCount}。`;
            const prompt = `你是一位食品检验专业教学专家。基于以下班级排序实验成绩数据，分析学生可能存在的共性问题（如操作顺序混淆点）、薄弱环节，并提出针对性的教学改进建议。要求语言简洁、专业，150字左右。数据：${summary}`;
            const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: [{ role: 'user', content: prompt }],
                    temperature: 0.5
                })
            });
            if (!response.ok) throw new Error(`API请求失败 ${response.status}`);
            const data = await response.json();
            return data.choices[0].message.content;
        }

        async function showStatsAndAnalysis() {
            let statsArea = document.getElementById('statsArea');
            let statsTable = renderStatsTable();
            statsArea.innerHTML = statsTable + '<div id="analysisDiv" class="analysis-box">🤖 正在调用AI进行学情分析，请确保已填写DeepSeek API Key...</div>';
            // 如果未设置apiKey，提示用户设置
            if (!apiKey) {
                statsArea.innerHTML += '<div class="analysis-box" style="color:#ffd966;">⚠️ 未设置DeepSeek API Key，无法进行AI分析。请在教师面板上方输入API Key并保存。</div>';
                return;
            }
            try {
                let analysis = await callAIAnalysis(computeStudentStats());
                document.getElementById('analysisDiv').innerHTML = `<strong>📝 AI学情分析与教学建议：</strong><br>${analysis}`;
            } catch (err) {
                document.getElementById('analysisDiv').innerHTML = `<strong>❌ AI分析失败：</strong> ${err.message}`;
            }
        }

        function exportDetailsCSV() {
            const records = getScoreRecords();
            if (!records.length) {
                alert("无记录可导出");
                return;
            }
            let csvRows = [["姓名", "得分", "满分", "提交时间", "错误详情"]];
            records.forEach(rec => {
                let errorStr = rec.errorDetails ? rec.errorDetails.join("；") : "";
                csvRows.push([
                    `"${rec.name.replace(/"/g, '""')}"`,
                    rec.score,
                    rec.total,
                    `"${rec.time}"`,
                    `"${errorStr.replace(/"/g, '""')}"`
                ]);
            });
            let csv = csvRows.map(row => row.join(",")).join("\n");
            let blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8" });
            let link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = "ph_order_records.csv";
            link.click();
            URL.revokeObjectURL(link.href);
        }

        function clearAllRecords() {
            if (confirm("⚠️ 清空所有学生记录？不可恢复。")) {
                localStorage.removeItem(STORAGE_KEY);
                renderTeacherRecords();
                document.getElementById('statsArea').innerHTML = '';
                alert("已清空");
            }
        }

        function showTeacherPanelWithPassword() {
            const pwd = prompt("🔒 教师权限验证\n请输入密码：");
            if (pwd === TEACHER_PASSWORD) {
                // 动态增加API Key输入区域（如果尚未添加）
                if (!document.getElementById('apiKeyRow')) {
                    const apiDiv = document.createElement('div');
                    apiDiv.id = 'apiKeyRow';
                    apiDiv.style.marginBottom = '12px';
                    apiDiv.style.background = '#0f3853';
                    apiDiv.style.padding = '8px';
                    apiDiv.style.borderRadius = '24px';
                    apiDiv.innerHTML = `
                        <label style="font-size:0.75rem;">🔑 DeepSeek API Key (用于AI学情分析):</label>
                        <input type="password" id="teacherApiKey" style="width:70%; margin-left:8px; border-radius:40px; border:none; padding:4px 8px;" placeholder="sk-...">
                        <button id="saveTeacherApiBtn" style="margin-left:8px; background:#2680eb; border:none; border-radius:40px; padding:4px 12px; color:white;">保存</button>
                        <span id="apiStatusMsg" style="font-size:0.7rem; margin-left:8px;"></span>
                    `;
                    teacherPanel.insertBefore(apiDiv, teacherPanel.firstChild);
                    // 加载已保存的API Key
                    const savedApi = localStorage.getItem('order_api_key') || '';
                    if (savedApi) {
                        const input = document.getElementById('teacherApiKey');
                        if (input) input.value = savedApi;
                        apiKey = savedApi;
                    }
                    document.getElementById('saveTeacherApiBtn').addEventListener('click', () => {
                        const newKey = document.getElementById('teacherApiKey').value.trim();
                        if (newKey.startsWith('sk-')) {
                            localStorage.setItem('order_api_key', newKey);
                            apiKey = newKey;
                            document.getElementById('apiStatusMsg').innerText = '✅ 已保存';
                        } else {
                            alert('无效的API Key格式');
                        }
                    });
                }
                renderTeacherRecords();
                teacherPanel.style.display = 'block';
                teacherPanel.scrollIntoView({ behavior: 'smooth' });
            } else if (pwd !== null) {
                alert("密码错误，无权限查看。");
            }
        }

        function resetGame() {
            if (leftSortable) leftSortable.destroy();
            if (rightSortable) rightSortable.destroy();
            leftContainer.innerHTML = '';
            rightContainer.innerHTML = '';
            const shuffled = shuffleArray(DISPLAY_STEPS);
            shuffled.forEach(step => leftContainer.appendChild(createCard(step)));
            const emptyDiv = document.createElement('div');
            emptyDiv.className = 'empty-hint';
            emptyDiv.innerHTML = '✨ 将左侧步骤拖拽至此<br>并按正确实验顺序排列';
            rightContainer.appendChild(emptyDiv);
            initSortable();
            scoreDetailDiv.style.display = 'none';
            teacherPanel.style.display = 'none';
            updatePlaceholders();
        }

        function initSortable() {
            const groupConfig = { name: 'phGroup', pull: true, revertClone: false, sort: true };
            leftSortable = new Sortable(leftContainer, {
                group: groupConfig, animation: 200, ghostClass: 'sortable-drag', touchStartThreshold: 2,
                onEnd: () => updatePlaceholders()
            });
            rightSortable = new Sortable(rightContainer, {
                group: groupConfig, animation: 200, ghostClass: 'sortable-drag', touchStartThreshold: 2,
                onEnd: () => updatePlaceholders()
            });
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // 绑定事件
        document.getElementById('submitBtn').addEventListener('click', onSubmit);
        document.getElementById('resetBtn').addEventListener('click', resetGame);
        document.getElementById('teacherBtn').addEventListener('click', showTeacherPanelWithPassword);
        document.getElementById('clearRecordsBtn').addEventListener('click', clearAllRecords);
        document.getElementById('exportCsvBtn').addEventListener('click', exportDetailsCSV);
        document.getElementById('statsBtn').addEventListener('click', showStatsAndAnalysis);

        resetGame();
        teacherPanel.style.display = 'none';
    })();
</script>
</body>
</html>
